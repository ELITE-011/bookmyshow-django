<!DOCTYPE html>
<html>
<head>
    <title>Select Seats</title>

    <style>
        body {
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #1d2671, #c33764);
            color: white;
            text-align: center;
        }

        h2 {
            margin-top: 20px;
        }

        .screen {
            margin: 20px auto;
            width: 300px;
            background: #ccc;
            color: black;
            padding: 8px;
            border-radius: 5px;
        }

        .seats {
            display: grid;
            grid-template-columns: repeat(8, 40px);
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .seat {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
        }

        .available {
            background: white;
        }

        .selected {
            background: #00c853;
        }

        .booked {
            background: #777;
            cursor: not-allowed;
        }

        .reserved {
            background: orange;
            cursor: not-allowed;
        }

        input[type="checkbox"] {
            display: none;
        }

        .form-box {
            margin-top: 20px;
        }

        input {
            padding: 8px;
            margin: 5px;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #00c853;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #009624;
        }
        
        .poster {
            width: 180px;
            border-radius: 10px;
            margin-top: 10px;
             box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
</style>

    </style>
</head>

<body>

<h2>Select Seats for {{ movie.title }}</h2>
<img src="{{ movie.poster }}" alt="{{ movie.title }}" class="poster">

<h3 id="timer" style="color:yellow;"></h3>

<div class="screen">Screen</div>

<form method="POST" action="{% url 'book_ticket' movie.id %}">
    {% csrf_token %}

    <div class="seats">
        {% for seat in seats %}
            <label>
                <input type="checkbox" name="seats" value="{{ seat.seat_number }}"
                  {% if seat.is_booked or seat.is_reserved %}disabled{% endif %}>

                <div class="seat
                    {% if seat.is_booked %}
                        booked
                    {% elif seat.is_reserved %}
                        reserved
                    {% else %}
                        available
                    {% endif %}">
                    {{ seat.seat_number }}
                </div>
            </label>
        {% endfor %}
    </div>

    <div class="form-box">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
    </div>

<br>

<button type="submit">
    Pay Now
</button>

</form>
</body>
</html>
<script>
document.querySelectorAll('input[type="checkbox"]').forEach((checkbox) => {
    checkbox.addEventListener('change', function () {
        const seat = this.nextElementSibling;

        if (this.checked) {
            seat.classList.remove('available');
            seat.classList.add('selected');

            // Start timer only once
            if (!window.timerStarted) {
                window.timerStarted = true;
                startTimer(300); // 5 minutes
            }
        } else {
            seat.classList.remove('selected');
            seat.classList.add('available');
        }
    });
});

function startTimer(seconds) {

    const timer = document.getElementById("timer");

    const countdown = setInterval(function () {

        let minutes = Math.floor(seconds / 60);
        let secs = seconds % 60;

        timer.innerHTML =
            "⏳ Complete payment in " +
            minutes + ":" +
            (secs < 10 ? "0" : "") + secs;

        seconds--;

        if (seconds < 0) {

            clearInterval(countdown);

            alert("Reservation expired!");

            window.location.reload();
        }

    }, 1000);
}
</script>
