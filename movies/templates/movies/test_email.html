<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Email</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#1e3c72,#2a5298);
        }

        .card{
            background:white;
            width:430px;
            padding:40px;
            border-radius:18px;
            text-align:center;
            box-shadow:0 15px 40px rgba(0,0,0,.3);
        }

        .icon{
            font-size:70px;
            margin-bottom:20px;
        }

        h1{
            color:#28a745;
            margin-bottom:15px;
        }

        p{
            color:#555;
            font-size:18px;
            line-height:1.6;
        }

        .btn{
            display:inline-block;
            margin-top:30px;
            padding:12px 30px;
            background:#ff4b2b;
            color:white;
            text-decoration:none;
            border-radius:8px;
            transition:.3s;
        }

        .btn:hover{
            background:#e63d20;
        }

    </style>

</head>
<body>

<div class="card">

<div class="icon">📧</div>

<h1>Email Sent Successfully!</h1>

<p>
Your test email has been sent successfully using
<b>Resend API</b>.
</p>

<p>
Please check your Inbox or Spam folder.
</p>

<a href="/" class="btn">🏠 Go Home</a>

</div>

</body>
</html>
