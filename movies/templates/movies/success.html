<!DOCTYPE html>
<html>
<head>
<title>Booking Success</title>

<style>

body{
font-family:Arial;
background:linear-gradient(120deg,#00c6ff,#0072ff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.success-box{
background:white;
padding:40px;
border-radius:12px;
text-align:center;
width:420px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h1{
color:#28a745;
}

p{
font-size:16px;
color:#444;
}

a{
display:inline-block;
margin-top:20px;
padding:10px 18px;
background:#ff3d5a;
color:white;
text-decoration:none;
border-radius:6px;
}

a:hover{
background:#e73350;
}

</style>

</head>

<body>

<div class="success-box">

<h1>🎉 Booking Confirmed!</h1>

<p>Your ticket for <b>{{ movie.title }}</b> is successfully booked.</p>

<p>Please check your email for ticket confirmation.</p>

<a href="/">← Back to Movies</a>

</div>

</body>

</html>
