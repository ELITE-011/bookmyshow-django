<!DOCTYPE html>
<html>
<head>
    <title>Payment Success</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background: linear-gradient(135deg,#1e3c72,#2a5298);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 0 20px rgba(0,0,0,0.3);
            width:400px;
        }

        h1{
            color:green;
        }

        p{
            font-size:18px;
        }

        .btn{
            display:inline-block;
            margin-top:20px;
            padding:12px 25px;
            background:#ff4b2b;
            color:white;
            text-decoration:none;
            border-radius:8px;
        }

        .btn:hover{
            background:#ff2e00;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🎉 Payment Successful</h1>

    <p>Your movie ticket has been booked successfully.</p>

    <a href="/" class="btn">Go Home</a>
</div>

</body>
</html>
