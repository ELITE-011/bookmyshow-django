<!DOCTYPE html>
<html>
<head>
    <title>Payment Cancelled</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background: linear-gradient(135deg,#232526,#414345);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:15px;
            text-align:center;
            width:400px;
        }

        h1{
            color:red;
        }

        .btn{
            display:inline-block;
            margin-top:20px;
            padding:12px 25px;
            background:#ff4b2b;
            color:white;
            text-decoration:none;
            border-radius:8px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>❌ Payment Cancelled</h1>

    <p>Your payment was not completed.</p>

    <a href="/" class="btn">Try Again</a>
</div>

</body>
</html>
